<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>访客记录统计 | Changxing Chunsheng Textile</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        background: #f5f8f8;
      }

      .stats-page {
        max-width: 1180px;
        margin: 0 auto;
        padding: 42px 20px 64px;
      }

      .stats-header {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-end;
        margin-bottom: 22px;
      }

      .stats-header h1 {
        max-width: 720px;
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.2rem);
      }

      .stats-header p {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .stats-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 18px;
      }

      .stat-card,
      .stats-panel {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        box-shadow: 0 12px 28px rgba(23, 43, 61, 0.08);
      }

      .stat-card {
        padding: 20px;
      }

      .stat-card strong {
        display: block;
        color: var(--blue);
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        line-height: 1;
      }

      .stat-card span {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-weight: 800;
      }

      .stats-panels {
        display: grid;
        grid-template-columns: minmax(0, 0.8fr) minmax(0, 1.2fr);
        gap: 14px;
      }

      .stats-panel {
        overflow: hidden;
      }

      .stats-panel h2 {
        margin: 0;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
        font-size: 1.2rem;
      }

      .source-list {
        display: grid;
        gap: 1px;
        margin: 0;
        padding: 0;
        background: var(--line);
        list-style: none;
      }

      .source-list li {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 13px 18px;
        background: #fff;
      }

      .source-list span {
        color: var(--muted);
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 760px;
      }

      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        font-size: 0.9rem;
        vertical-align: top;
      }

      th {
        color: var(--green);
        background: #f8fbfa;
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .empty {
        padding: 28px;
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .stats-header,
        .stats-panels {
          grid-template-columns: 1fr;
          display: grid;
        }

        .stats-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 520px) {
        .stats-grid {
          grid-template-columns: 1fr;
        }

        .stats-actions .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="stats-page">
      <header class="stats-header">
        <div>
          <p class="eyebrow">Visitor Analytics</p>
          <h1>访客记录统计</h1>
          <p>此页面读取当前浏览器保存的本地统计。上线后配置接口地址即可汇总真实全站访客数据。</p>
        </div>
        <div class="stats-actions">
          <a class="button secondary" href="index.html">返回网站</a>
          <button class="button secondary" type="button" data-export>导出 JSON</button>
          <button class="button primary" type="button" data-clear>清空本地统计</button>
        </div>
      </header>

      <section class="stats-grid" aria-label="Summary">
        <article class="stat-card">
          <strong data-total-views>0</strong>
          <span>页面访问</span>
        </article>
        <article class="stat-card">
          <strong data-total-visitors>0</strong>
          <span>独立访客</span>
        </article>
        <article class="stat-card">
          <strong data-total-sessions>0</strong>
          <span>访问会话</span>
        </article>
        <article class="stat-card">
          <strong data-total-inquiries>0</strong>
          <span>询盘操作</span>
        </article>
      </section>

      <section class="stats-panels">
        <article class="stats-panel">
          <h2>来源统计</h2>
          <ul class="source-list" data-source-list></ul>
        </article>
        <article class="stats-panel">
          <h2>最近记录</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>事件</th>
                  <th>来源</th>
                  <th>语言</th>
                  <th>设备</th>
                  <th>页面</th>
                </tr>
              </thead>
              <tbody data-event-table></tbody>
            </table>
          </div>
          <p class="empty" data-empty hidden>暂无记录。打开首页访问一次后，这里会显示本地统计。</p>
        </article>
      </section>
    </main>

    <script>
      (function () {
        const storageKey = "cs_visitor_events_v1";
        const events = readEvents();

        function readEvents() {
          try {
            return JSON.parse(localStorage.getItem(storageKey)) || [];
          } catch (error) {
            return [];
          }
        }

        function countUnique(key) {
          return new Set(events.map((event) => event[key]).filter(Boolean)).size;
        }

        function bySource() {
          return events.reduce((result, event) => {
            const source = event.source || "direct";
            result[source] = (result[source] || 0) + 1;
            return result;
          }, {});
        }

        function formatTime(value) {
          if (!value) return "";
          return new Intl.DateTimeFormat("zh-CN", {
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
          }).format(new Date(value));
        }

        function text(value) {
          return String(value || "").replace(/[&<>"']/g, (char) => {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char];
          });
        }

        document.querySelector("[data-total-views]").textContent = events.filter((event) => event.type === "page_view").length;
        document.querySelector("[data-total-visitors]").textContent = countUnique("visitorId");
        document.querySelector("[data-total-sessions]").textContent = countUnique("sessionId");
        document.querySelector("[data-total-inquiries]").textContent = events.filter((event) => event.type === "inquiry_submit").length;

        const sourceList = document.querySelector("[data-source-list]");
        const sources = Object.entries(bySource()).sort((a, b) => b[1] - a[1]).slice(0, 8);
        sourceList.innerHTML = sources.length
          ? sources.map(([source, count]) => `<li><strong>${text(source)}</strong><span>${count}</span></li>`).join("")
          : '<li><strong>暂无来源</strong><span>0</span></li>';

        const table = document.querySelector("[data-event-table]");
        const empty = document.querySelector("[data-empty]");
        const recent = events.slice(-30).reverse();
        empty.hidden = recent.length > 0;
        table.innerHTML = recent
          .map((event) => {
            return `<tr>
              <td>${text(formatTime(event.timestamp))}</td>
              <td>${text(event.type)}</td>
              <td>${text(event.source)}</td>
              <td>${text(event.language)}</td>
              <td>${text(event.device)}<br /><span>${text(event.viewport)}</span></td>
              <td>${text(event.page)}</td>
            </tr>`;
          })
          .join("");

        document.querySelector("[data-export]").addEventListener("click", () => {
          const blob = new Blob([JSON.stringify(events, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `visitor-events-${new Date().toISOString().slice(0, 10)}.json`;
          link.click();
          URL.revokeObjectURL(url);
        });

        document.querySelector("[data-clear]").addEventListener("click", () => {
          if (!confirm("确定清空当前浏览器中的本地统计记录吗？")) return;
          localStorage.removeItem(storageKey);
          location.reload();
        });
      })();
    </script>
  </body>
</html>
